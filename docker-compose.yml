version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crop_prediction_api
    command: uvicorn src.crop_yield.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    networks:
      - crop_network
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crop_prediction_dashboard
    command: streamlit run src/crop_yield/app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - api
    networks:
      - crop_network
    restart: unless-stopped

networks:
  crop_network:
    driver: bridge
